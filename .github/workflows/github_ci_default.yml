name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    # RPi::I2C (XS, Linux i2c-dev ioctls) can only build on Linux, so no
    # windows/macos runners for this dist
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: [ '5.42', '5.34', '5.32', '5.28', '5.24', '5.18', '5.14', '5.10' ]
        include:
          - perl: '5.32'
            coverage: true
    name: Perl ${{ matrix.perl }} on ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: Perl version
        run: perl -V
      - name: Install prereqs
        run: |
         cpanm ExtUtils::MakeMaker CPAN::Meta
         cpanm --installdeps .
      - name: Run tests (no coverage)
        if: ${{ !matrix.coverage }}
        run: prove -lv t
      - name: Run tests (with coverage)
        if: ${{ matrix.coverage }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cpanm -n Devel::Cover::Report::Coveralls
          cover -test -report Coveralls
